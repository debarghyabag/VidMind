services:
  - type: web
    name: vidmind-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: llm_endpoint_deb_gpt5
        sync: false
      - key: llm_deployment_deb_gpt5
        sync: false
      - key: api_key_deb_gpt5
        sync: false
      - key: api_version_deb_gpt5
        sync: false
      - key: WEBSHARE_PROXY_USERNAME
        sync: false
      - key: WEBSHARE_PROXY_PASSWORD
        sync: false
      - key: WEBSHARE_PROXY_LOCATIONS
        value: us
      - key: TRANSCRIPT_HTTP_PROXY
        sync: false
      - key: TRANSCRIPT_HTTPS_PROXY
        sync: false
